<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจสอบข้อมูลสมาชิก</title>
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="shield">✓</div>
    <div>
      <h1>ระบบตรวจสอบข้อมูลสมาชิก</h1>
      <p>Member Verification System</p>
    </div>
  </div>

  <a href="admin.html" class="admin-link">🔐 สำหรับแอดมิน</a>
</header>

<main class="home-page">

  <section class="hero-card">
    <div class="hero-content">
      <span class="badge">ระบบตรวจสอบข้อมูลส่วนตัว</span>

      <h2>ตรวจสอบข้อมูล<br>และประวัติของท่าน</h2>

      <p>
        กรุณากรอกเลขบัตรประชาชน 13 หลัก เพื่อดูข้อมูล
      </p>

      <div class="search-panel">
        <label>เลขบัตรประชาชน 13 หลัก</label>

        <div class="home-search-row">
          <input
            id="citizenId"
            type="text"
            maxlength="13"
            placeholder="กรอกเลขบัตรประชาชนของท่าน">

          <button onclick="searchMember()">ตรวจสอบข้อมูล</button>
        </div>

        <small>ระบบจะแสดงเฉพาะข้อมูลของเลขบัตรประชาชนที่ค้นหาเท่านั้น</small>
      </div>
    </div>
  </section>

  <section id="result" class="result-area"></section>
  
  </section>

</main>

<footer class="site-footer">
  <p>หากข้อมูลไม่ถูกต้อง กรุณาติดต่อเจ้าหน้าที่เพื่อตรวจสอบ</p>
</footer>

<script src="app.js"></script>

</body>
</html>
