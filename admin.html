<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - บันทึกข้อมูลสมาชิก</title>
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="shield">A</div>
    <div>
      <h1>ระบบแอดมิน</h1>
      <p>บันทึกข้อมูลสมาชิกและรายการลงทุน</p>
    </div>
  </div>

  <div class="secure-text">🔒 Admin Area</div>
</header>

<main class="page">

  <section id="loginBox" class="search-box">
    <h2>เข้าสู่ระบบแอดมิน</h2>

    <div class="admin-form">
      <div class="form-group full">
        <label>รหัสผ่านแอดมิน</label>
        <input id="loginPassword" type="password" placeholder="กรอกรหัสผ่านแอดมิน">
      </div>

      <button class="admin-submit" onclick="adminLogin()">เข้าสู่ระบบ</button>

      <div id="loginResult"></div>
    </div>
  </section>

  <section id="adminBox" class="search-box hidden">

    <h2>Dashboard</h2>

    <div class="admin-dashboard">
      <div class="dash-card green">
        <span>สมาชิกทั้งหมด</span>
        <strong id="totalMembers">0</strong>
        <small>คน</small>
      </div>

      <div class="dash-card blue">
        <span>ยอดลงทุนรวม</span>
        <strong id="totalInvestmentAll">0</strong>
        <small>บาท</small>
      </div>

      <div class="dash-card blue">
        <span>รายการลงทุนทั้งหมด</span>
        <strong id="totalPayments">0</strong>
        <small>รายการ</small>
      </div>

      <div class="dash-card green">
        <span>ยอดวันนี้</span>
        <strong id="todayInvestment">0</strong>
        <small>บาท</small>
      </div>
    </div>

    <h2>บันทึกรายการลงทุน</h2>

    <div class="admin-form">

      <div class="form-group">
        <label>เลขบัตรประชาชน 13 หลัก</label>
        <input id="citizen_id" type="text" maxlength="13" placeholder="1234567890123">
        <button type="button" class="small-btn" onclick="findMemberForAdmin()">ค้นหาสมาชิก</button>
      </div>

      <div class="form-group">
        <label>ชื่อ-นามสกุล</label>
        <input id="fullname" type="text" placeholder="นายสมชาย ใจดี">
      </div>

      <div class="form-group">
        <label>เบอร์โทรศัพท์</label>
        <input id="phone" type="text" placeholder="0812345678">
      </div>

      <div class="form-group">
        <label>วันที่จ่ายเงิน</label>
        <input id="pay_date" type="text" placeholder="12/06/2569">
      </div>

      <div class="form-group">
        <label>เวลา</label>
        <input id="pay_time" type="text" placeholder="10:30">
      </div>

      <div class="form-group">
        <label>ยอดลงทุน</label>
        <input id="investment" type="number" placeholder="500">
      </div>

      <div class="form-group">
        <label>เลขอ้างอิง</label>
        <input id="reference" type="text" placeholder="REF001">
      </div>

      <div class="form-group">
        <label>ค่าเดินทาง</label>
        <input id="travel_fee" type="number" placeholder="0">
      </div>

      <div class="form-group">
        <label>เงินด่วน</label>
        <input id="urgent_money" type="number" placeholder="0">
      </div>

      <div class="form-group">
        <label>เงินหลัก</label>
        <input id="principal_money" type="number" placeholder="0">
      </div>

      <div class="form-group full">
        <label>หมายเหตุ</label>
        <input id="note" type="text" placeholder="หมายเหตุ">
      </div>

      <button id="addBtn" class="admin-submit" onclick="addPayment()">บันทึกข้อมูล</button>

      <button id="updateBtn" class="admin-submit hidden" onclick="updatePayment()">บันทึกการแก้ไข</button>

      <button id="cancelEditBtn" class="admin-logout hidden" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>

      <div id="adminResult"></div>

      <div id="memberHistory" class="form-group full"></div>

      <button class="admin-logout" onclick="adminLogout()">ออกจากระบบ</button>

    </div>

  </section>

</main>

<script src="admin.js"></script>

</body>
</html>
